<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login - Global News</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container" style="max-width: 440px;">
    <div class="card" style="margin-top: 40px;">
        <h1>Sign In</h1>
        <p class="muted" style="margin-bottom: 20px;">Welcome back. Enter your credentials to manage your account.</p>

        <div class="alert" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <div class="alert alert-success" th:if="${param.registered}">Registration successful! Please log in.</div>

        <form class="stacked" th:action="@{/perform_login}" th:object="${loginRequest}" method="post">
            <label>Username</label>
            <input type="text" th:field="*{username}" placeholder="Enter username" required/>

            <label>Password</label>
            <input type="password" th:field="*{password}" placeholder="••••••••" required/>

            <button type="submit" style="width: 100%;">Log In</button>
        </form>

        <p class="muted" style="margin-top:20px; text-align:center;">
            Don't have an account? <a href="/register" style="color:var(--primary); font-weight:600;">Register here</a>
        </p>
    </div>
</div>
</body>
</html>
