<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${category.name} + ' - Global News'">Category</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container">
    <div style="margin-bottom: 24px;">
        <a href="/" class="muted" style="text-decoration:none;">&larr; All Categories</a>
        <h1 th:text="${category.name}" style="margin-top: 8px;">Category</h1>
    </div>

    <div th:if="${#lists.isEmpty(newsList)}" class="card muted">
        No news items available in this category yet.
    </div>

    <div class="news-feed" th:if="${!#lists.isEmpty(newsList)}">
        <div class="news-card" th:each="n : ${newsList}">
            <div>
                <div class="tag-container">
                    <span class="tag" th:each="c : ${n.categories}" th:text="${c.name}">Tag</span>
                </div>
                <h3>
                    <a th:href="@{/news/{id}(id=${n.id})}" th:text="${n.title}">Headline Title</a>
                </h3>
            </div>
            <div class="muted" style="font-size:0.85rem; margin-top: 16px;" th:text="'By ' + ${n.authorUsername}">
                Author
            </div>
        </div>
    </div>
</div>
</body>
</html>
